<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match & Tap: My Choice</title>
    <style>
        :root {
            --blue-team: #3498db;
            --purple-team: #9b59b6;
            --bg-dark: #2c3e50;
            --white: #ecf0f1;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 8vh;
            display: flex;
            background: rgba(0,0,0,0.4);
            border-bottom: 4px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .header-half {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f1c40f;
        }

        #header-blue { border-right: 2px solid rgba(255,255,255,0.2); }

        main {
            flex: 1;
            display: flex;
            position: relative;
        }

        .arena {
            flex: 1;
            position: relative;
            overflow: hidden;
            transition: background-color 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #blue-arena { border-right: 2px solid rgba(255,255,255,0.2); }
        #purple-arena { border-left: 2px solid rgba(255,255,255,0.2); }

        .grade-badge {
            margin-top: 15px;
            padding: 8px 20px;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            z-index: 5;
            text-transform: uppercase;
            background: rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }

        .blue-grade { color: #3498db; }
        .purple-grade { color: #9b59b6; }

        .sentence-panel {
            margin-top: 15px;
            width: 90%;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.5rem;
            line-height: 1.3;
            color: #2c3e50;
            border-bottom: 5px solid #f1c40f;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
            pointer-events: none;
        }

        .sentence-panel b {
            position: relative;
            color: #e67e22;
            text-decoration: none;
            border-bottom: 3px dashed #7f8c8d;
            padding: 0 8px;
            min-width: 120px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .sentence-panel.completed b {
            color: #27ae60;
            border-bottom: 3px solid #2ecc71;
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .items-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .emoji-item {
            position: absolute;
            font-size: 85px;
            cursor: pointer;
            width: 110px;
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            pointer-events: auto;
            transition: transform 0.05s linear;
        }

        .emoji-item.flying {
            z-index: 200;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            opacity: 0;
            transform: scale(0.2) !important;
        }

        .butterfly-svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            animation: flap 0.4s infinite alternate ease-in-out;
        }

        @keyframes flap {
            from { transform: scaleX(0.8); }
            to { transform: scaleX(1.1); }
        }

        .shuffle-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 2px solid white;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 110;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #start-screen { background: linear-gradient(135deg, var(--blue-team), var(--purple-team)); }
        
        .btn-main {
            padding: 20px 60px;
            font-size: 2.5rem;
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 8px 0 #d4ac0d;
        }

        .flash-choice { background-color: rgba(255,255,255,0.15) !important; }

    </style>
</head>
<body>

    <header>
        <div id="header-blue" class="header-half">Jobs</div>
        <div id="header-purple" class="header-half">Butterflies</div>
    </header>

    <main>
        <!-- Blue Arena: Jobs -->
        <section id="blue-arena" class="arena">
            <div class="grade-badge blue-grade">4-6 Grade</div>
            
            <div id="blue-sentence-box" class="sentence-panel">
                What do you want to be?<br>
                I want to be a/an <b id="blue-sentence-fill">...</b>.
            </div>

            <div id="blue-container" class="items-layer"></div>
            
            <button class="shuffle-btn" id="blue-shuffle">SHUFFLE</button>
        </section>

        <!-- Purple Arena: Colors -->
        <section id="purple-arena" class="arena">
            <div class="grade-badge purple-grade">1-3 Grade</div>

            <div id="purple-sentence-box" class="sentence-panel">
                What color do you like?<br>
                I like <b id="purple-sentence-fill">...</b>.
            </div>

            <div id="purple-container" class="items-layer"></div>
            
            <button class="shuffle-btn" id="purple-shuffle">SHUFFLE</button>
        </section>
    </main>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 3rem; margin-bottom: 20px; color: white;">Free Choice Mode</h1>
        <p style="color: white; margin-bottom: 30px; font-size: 1.2rem;">Tap an icon to fill in the blank!</p>
        <button id="start-btn" class="btn-main">START</button>
    </div>

    <script>
        const JOBS = [
            { name: 'police officer', emoji: '👮' },
            { name: 'dentist', emoji: '🦷' },
            { name: 'artist', emoji: '🎨' },
            { name: 'singer', emoji: '🎤' },
            { name: 'writer', emoji: '✍️' },
            { name: 'farmer', emoji: '👩‍🌾' },
            { name: 'bus driver', emoji: '🚌' },
            { name: 'basketball player', emoji: '🏀' },
            { name: 'teacher', emoji: '👨‍🏫' },
            { name: 'doctor', emoji: '👨‍⚕️' },
            { name: 'nurse', emoji: '👩‍⚕️' },
            { name: 'chef', emoji: '👨‍🍳' }
        ];

        const COLORS = [
            { name: 'red', color: '#FF0000' },
            { name: 'orange', color: '#FF8C00' },
            { name: 'yellow', color: '#FFFF00' },
            { name: 'green', color: '#00FF00' },
            { name: 'purple', color: '#A020F0' },
            { name: 'blue', color: '#0000FF' },
            { name: 'pink', color: '#FFC0CB' },
            { name: 'white', color: '#FFFFFF' },
            { name: 'brown', color: '#8B4513' }
        ];

        const SPEED_MULTIPLIER = 2.0;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function createButterflySVG(color) {
            return `
                <svg class="butterfly-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 50 Q75 10 90 40 Q95 70 50 60" fill="${color}" stroke="#000" stroke-width="2"/>
                    <path d="M50 50 Q25 10 10 40 Q5 70 50 60" fill="${color}" stroke="#000" stroke-width="2"/>
                    <ellipse cx="50" cy="50" rx="4" ry="15" fill="#333" />
                </svg>
            `;
        }

        class TeamArena {
            constructor(side, dataSet) {
                this.side = side;
                this.dataSet = dataSet;
                this.items = [];
                this.isFrozen = false;
                this.container = document.getElementById(`${side}-container`);
                this.arenaEl = document.getElementById(`${side}-arena`);
                this.fillEl = document.getElementById(`${side}-sentence-fill`);
                this.boxEl = document.getElementById(`${side}-sentence-box`);
                this.bounds = { width: 0, height: 0 };
                this.init();
            }

            init() {
                this.container.innerHTML = '';
                this.items = [];
                this.dataSet.forEach(data => {
                    const el = document.createElement('div');
                    el.className = 'emoji-item';
                    if (this.side === 'purple') el.innerHTML = createButterflySVG(data.color);
                    else el.innerHTML = data.emoji;
                    
                    const obj = {
                        el: el,
                        name: data.name,
                        x: 0,
                        y: 0,
                        vx: (Math.random() - 0.5) * SPEED_MULTIPLIER,
                        vy: (Math.random() - 0.5) * SPEED_MULTIPLIER,
                        size: 110,
                        isFlying: false
                    };

                    el.addEventListener('pointerdown', (e) => {
                        e.stopPropagation();
                        this.handleChoice(obj);
                    });

                    this.items.push(obj);
                    this.container.appendChild(el);
                });

                this.updateBounds();
                this.shufflePositions();
            }

            updateBounds() {
                const rect = this.arenaEl.getBoundingClientRect();
                this.bounds.width = rect.width;
                this.bounds.height = rect.height;
            }

            shufflePositions() {
                this.items.forEach(item => {
                    item.isFlying = false;
                    item.el.classList.remove('flying');
                    const spawnTop = 220; 
                    item.x = Math.random() * (this.bounds.width - item.size);
                    item.y = spawnTop + Math.random() * (this.bounds.height - item.size - spawnTop - 80);
                    const angle = Math.random() * Math.PI * 2;
                    item.vx = Math.cos(angle) * SPEED_MULTIPLIER;
                    item.vy = Math.sin(angle) * SPEED_MULTIPLIER;
                });
                this.fillEl.innerText = "...";
                this.boxEl.classList.remove('completed');
            }

            handleChoice(item) {
                if (this.isFrozen || item.isFlying) return;
                
                this.isFrozen = true;
                item.isFlying = true;
                
                playSound();
                this.flyToBlank(item);
                
                setTimeout(() => {
                    this.fillEl.innerText = item.name; 
                    this.boxEl.classList.add('completed');
                    this.arenaEl.classList.add('flash-choice');
                    setTimeout(() => this.arenaEl.classList.remove('flash-choice'), 300);
                }, 400);

                setTimeout(() => {
                    this.isFrozen = false;
                    this.shufflePositions();
                }, 1800);
            }

            flyToBlank(item) {
                const arenaRect = this.arenaEl.getBoundingClientRect();
                const blankRect = this.fillEl.getBoundingClientRect();
                
                const targetX = (blankRect.left - arenaRect.left) + (blankRect.width / 2) - (item.size / 2);
                const targetY = (blankRect.top - arenaRect.top) + (blankRect.height / 2) - (item.size / 2);

                item.el.classList.add('flying');
                item.x = targetX;
                item.y = targetY;
                item.el.style.transform = `translate(${item.x}px, ${item.y}px)`;
            }

            update() {
                if (this.isFrozen) return;
                this.items.forEach(item => {
                    if (item.isFlying) return;

                    item.x += item.vx;
                    item.y += item.vy;
                    
                    if (item.x <= 0) { item.x = 0; item.vx = Math.abs(item.vx); }
                    else if (item.x >= this.bounds.width - item.size) { item.x = this.bounds.width - item.size; item.vx = -Math.abs(item.vx); }
                    
                    const spawnTop = 200; 
                    if (item.y <= spawnTop) { item.y = spawnTop; item.vy = Math.abs(item.vy); }
                    else if (item.y >= this.bounds.height - item.size) { item.y = this.bounds.height - item.size; item.vy = -Math.abs(item.vy); }
                    
                    item.el.style.transform = `translate(${item.x}px, ${item.y}px)`;
                });
            }
        }

        const gameState = {
            status: 'menu',
            blueTeam: null,
            purpleTeam: null
        };

        function startGame() {
            initAudio();
            gameState.status = 'playing';
            document.getElementById('start-screen').style.display = 'none';
            if (!gameState.blueTeam) {
                gameState.blueTeam = new TeamArena('blue', JOBS);
                gameState.purpleTeam = new TeamArena('purple', COLORS);
            } else {
                gameState.blueTeam.init();
                gameState.purpleTeam.init();
            }
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (gameState.status !== 'playing') return;
            gameState.blueTeam.update();
            gameState.purpleTeam.update();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => {
            if (gameState.blueTeam) gameState.blueTeam.updateBounds();
            if (gameState.purpleTeam) gameState.purpleTeam.updateBounds();
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('blue-shuffle').addEventListener('click', () => gameState.blueTeam?.shufflePositions());
        document.getElementById('purple-shuffle').addEventListener('click', () => gameState.purpleTeam?.shufflePositions());
    </script>
</body>
</html>
